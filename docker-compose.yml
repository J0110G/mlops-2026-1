name: mlops-2026-1
services:
  mongo:
    image: mongo
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  mlops-container:
    container_name: mlops-container
    build:
      context: .
      dockerfile: app/app.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
